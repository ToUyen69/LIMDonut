<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo-wrap">
        <img src="/avata.jpeg" alt="LIMDonut Logo" class="login-logo" onerror="this.style.display='none'">
      </div>
      <h2>LIMDonut</h2>
      <span class="login-badge">ADMIN</span>
      <p>Đăng nhập quản trị hệ thống</p>
    </div>

    @if (error()) {
    <div class="login-error">
      <i class="bi bi-exclamation-circle me-1"></i>{{ error() }}
    </div>
    }

    <div class="login-form mx-auto">
      <div class="login-field">
        <label><i class="bi bi-person me-1"></i>Tên đăng nhập</label>
        <input type="text" [ngModel]="username()" (ngModelChange)="username.set($event)" (keyup.enter)="login()"
          placeholder="admin">
      </div>

      <div class="login-field">
        <label><i class="bi bi-lock me-1"></i>Mật khẩu</label>
        <input type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" (keyup.enter)="login()"
          placeholder="••••••">
      </div>

      <button class="login-btn" (click)="login()" [disabled]="loading() || !username() || !password()">
        @if (loading()) {
        <i class="bi bi-arrow-repeat spin me-1"></i>Đang đăng nhập...
        } @else {
        <i class="bi bi-box-arrow-in-right me-1"></i>Đăng nhập
        }
      </button>
    </div>
  </div>
</div>
