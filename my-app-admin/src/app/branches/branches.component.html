<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="page-title mb-0">Chi nhánh</h2>
  <button class="btn-add" (click)="openNew()"><i class="bi bi-plus-lg me-1"></i>Thêm chi nhánh</button>
</div>

<div class="row g-3">
  @for (b of service.branches(); track b._id) {
    <div class="col-md-6 col-lg-4">
      <div class="card h-100">
        <div class="card-body p-3">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h6 class="fw-bold mb-0">{{ b.name }}</h6>
            <span class="badge" [class]="b.active ? 'bg-success' : 'bg-secondary'">{{ b.active ? 'Mở' : 'Đóng' }}</span>
          </div>
          <div class="small text-muted mb-1"><i class="bi bi-geo-alt me-1"></i>{{ b.address }}</div>
          <div class="small text-muted mb-1"><i class="bi bi-telephone me-1"></i>{{ b.phone || '—' }}</div>
          <div class="small text-muted mb-2"><i class="bi bi-clock me-1"></i>{{ b.openHours }}</div>
          <div class="d-flex gap-1">
            <button class="btn btn-sm btn-outline-primary rounded-pill px-3" (click)="openEdit(b)"><i class="bi bi-pencil"></i> Sửa</button>
            <button class="btn btn-sm btn-outline-danger rounded-pill px-2" (click)="remove(b)"><i class="bi bi-trash"></i></button>
          </div>
        </div>
      </div>
    </div>
  } @empty {
    <div class="col-12 text-center text-muted py-5">
      <i class="bi bi-shop fs-1 d-block mb-2"></i>Chưa có chi nhánh nào.
    </div>
  }
</div>

<!-- Branch Form Modal -->
@if (showForm()) {
  <div class="modal-backdrop fade show"></div>
  <div class="modal d-block" (click)="close()">
    <div class="modal-dialog modal-dialog-centered" (click)="$event.stopPropagation()">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">{{ editing() ? 'Sửa chi nhánh' : 'Thêm chi nhánh' }}</h5>
          <button type="button" class="btn-close" (click)="close()"></button>
        </div>
        <div class="modal-body">
          <div class="mb-2"><label class="form-label small fw-bold">Tên *</label><input class="form-control" [(ngModel)]="form.name"></div>
          <div class="mb-2"><label class="form-label small fw-bold">Địa chỉ *</label><input class="form-control" [(ngModel)]="form.address"></div>
          <div class="mb-2"><label class="form-label small fw-bold">Số điện thoại</label><input class="form-control" [(ngModel)]="form.phone"></div>
          <div class="mb-2"><label class="form-label small fw-bold">Giờ mở cửa</label><input class="form-control" [(ngModel)]="form.openHours"></div>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" [(ngModel)]="form.active">
            <label class="form-check-label">Đang hoạt động</label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary rounded-pill px-3" (click)="close()">Hủy</button>
          <button class="btn btn-primary rounded-pill px-4" (click)="save()">Lưu</button>
        </div>
      </div>
    </div>
  </div>
}
