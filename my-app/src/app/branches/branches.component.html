<div class="branches-page">
  <!-- Page Banner -->
  <section class="page-banner">
    <div class="banner-content">
      <span class="subtitle">HỆ THỐNG CỬA HÀNG</span>
      <h1 class="title">Các chi nhánh hoạt động</h1>
      <p class="desc">Ghé thăm và trải nghiệm không gian ngọt ngào tại các cửa hàng của LIMDonut.</p>
    </div>
  </section>

  <section class="branches-content">
    <div class="container">
      <div class="row g-4">
        <!-- Left: Branches List -->
        <div class="col-lg-5">
          <div class="d-flex flex-column gap-3">
            <div
              *ngFor="let branch of branches"
              class="card branch-item border-0"
              [class.active]="selectedBranch.id === branch.id"
              (click)="selectBranch(branch)"
            >
              <div class="card-body p-3">
                <div class="d-flex gap-3">
                  <div class="branch-image">
                    <img [src]="branch.image" [alt]="branch.name" class="rounded-3">
                  </div>
                  <div class="branch-info">
                    <h3>
                      <span class="icon"><i class="bi bi-house-door-fill"></i></span>
                      {{ branch.name }}
                    </h3>
                    <p class="address mb-2">
                      <span class="icon"><i class="bi bi-geo-alt-fill"></i></span>
                      {{ branch.address }}
                    </p>
                    <p class="phone mb-0">
                      <span class="icon"><i class="bi bi-telephone-fill"></i></span>
                      {{ branch.phone }}
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: Map View -->
        <div class="col-lg-7">
          <div class="card map-container border-0">
            <div class="map-header card-header bg-light border-bottom">
              <span class="icon"><i class="bi bi-geo-alt-fill"></i></span>
              <span>{{ selectedBranch.address }}</span>
            </div>
            <div class="card-body p-0 map-iframe-wrapper">
              <iframe
                [src]="selectedBranch.safeMapUrl"
                width="100%"
                height="100%"
                style="border:0;"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
              ></iframe>
            </div>
            <div class="card-footer map-footer bg-white">
              <a [href]="'https://www.google.com/maps/search/?api=1&query=' + selectedBranch.address" target="_blank" class="open-maps-btn">
                Mở trong Maps <span class="external-icon"><i class="bi bi-box-arrow-up-right"></i></span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
