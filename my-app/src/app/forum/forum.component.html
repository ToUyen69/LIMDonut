<div class="forum-page">
  <!-- Page Banner -->
  <section class="page-banner">
    <div class="banner-content text-center">
      <span class="subtitle badge text-uppercase mb-2">DIỄN ĐÀN LIMDONUT</span>
      <h1 class="title">Tin tức & Khuyến mãi</h1>
      <p class="desc">Cập nhật những tin tức mới nhất và chương trình ưu đãi hấp dẫn từ LIMDonut.</p>
    </div>
  </section>

  <!-- Blog Content -->
  <section class="forum-content">
    <div class="container">
      <div class="row g-4 mb-5">
        <div class="col-lg-3 col-md-4 col-sm-6" *ngFor="let post of pagedPosts">
          <div class="card blog-card h-100 border-0" [routerLink]="['/forum', post.id]">
            <div class="card-img-top-wrapper">
              <img [src]="post.mainImage | imgUrl" [alt]="post.title" class="card-img-top">
            </div>
            <div class="card-body">
              <span class="text-muted small d-block mb-2">{{ post.date }}</span>
              <h3 class="card-title post-title">{{ post.title }}</h3>
            </div>
          </div>
        </div>
      </div>

      <!-- Pagination -->
      <nav *ngIf="totalPages > 1" aria-label="Forum pagination">
        <ul class="pagination justify-content-center gap-2">
          <li class="page-item" [class.disabled]="currentPage === 1">
            <button class="page-link page-btn" (click)="setPage(currentPage - 1)">
              <i class="fas fa-chevron-left"></i>
            </button>
          </li>
          <li class="page-item" *ngFor="let page of pages" [class.active]="currentPage === page">
            <button class="page-link page-btn" (click)="setPage(page)">{{ page }}</button>
          </li>
          <li class="page-item" [class.disabled]="currentPage === totalPages">
            <button class="page-link page-btn" (click)="setPage(currentPage + 1)">
              <i class="fas fa-chevron-right"></i>
            </button>
          </li>
        </ul>
      </nav>
    </div>
  </section>
</div>
