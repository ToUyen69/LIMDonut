<div class="login-page d-flex justify-content-center align-items-center min-vh-100">
  <div class="card login-card border-0">
    <div class="card-body p-0">
      <div class="form-header text-center mb-4">
        <div class="brand-mini-label">LỊM DONUT</div>
        <h1 class="welcome-text">Quên mật khẩu</h1>
        <p class="welcome-subtext">Nhập email để nhận mã OTP đặt lại mật khẩu.</p>
      </div>

      <!-- STEP 1: Nhập email -->
      @if (step() === 1) {
        <div class="login-type-title text-center mb-4">
          <span>Bước 1: Xác minh email</span>
        </div>
        <form (ngSubmit)="requestOtp()" class="login-form mx-auto">
          <div class="mb-3">
            <label for="email" class="form-label fw-bold">Email đã đăng ký <span class="text-danger">*</span></label>
            <input type="email" id="email" class="form-control form-control-lg" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" placeholder="Nhập email của bạn" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg submit-btn" [disabled]="loading()">
            {{ loading() ? 'Đang gửi...' : 'Gửi mã OTP' }}
          </button>
          <div class="divider-text text-center text-muted my-3">Hoặc</div>
          <button type="button" class="btn btn-outline-primary w-100 btn-lg create-account-btn" routerLink="/login">
            Quay lại Đăng nhập
          </button>
        </form>
      }

      <!-- STEP 2: Nhập OTP + mật khẩu mới -->
      @if (step() === 2) {
        <div class="login-type-title text-center mb-4">
          <span>Bước 2: Đặt lại mật khẩu</span>
        </div>

        <div class="demo-otp-box mx-auto mb-4">
          <div class="d-flex align-items-center gap-2">
            <i class="bi bi-info-circle-fill text-warning"></i>
            <strong>Kiểm tra mã OTP</strong>
          </div>
          <small class="text-muted">Mã OTP đã được gửi tới email của bạn (bản demo: xem console của server backend). Mã có hiệu lực 5 phút.</small>
        </div>

        <form (ngSubmit)="resetPassword()" class="login-form mx-auto">
          <div class="mb-3">
            <label for="otp" class="form-label fw-bold">Mã OTP <span class="text-danger">*</span></label>
            <input type="text" id="otp" class="form-control form-control-lg" [ngModel]="otp()" (ngModelChange)="otp.set($event)" name="otp" placeholder="Nhập mã OTP 6 số" maxlength="6" required>
          </div>
          <div class="mb-3">
            <label for="newPassword" class="form-label fw-bold">Mật khẩu mới <span class="text-danger">*</span></label>
            <input type="password" id="newPassword" class="form-control form-control-lg" [ngModel]="newPassword()" (ngModelChange)="newPassword.set($event)" name="newPassword" placeholder="Nhập mật khẩu mới" required>
          </div>
          <div class="mb-3">
            <label for="confirmPassword" class="form-label fw-bold">Xác nhận mật khẩu mới <span class="text-danger">*</span></label>
            <input type="password" id="confirmPassword" class="form-control form-control-lg" [ngModel]="confirmPassword()" (ngModelChange)="confirmPassword.set($event)" name="confirmPassword" placeholder="Nhập lại mật khẩu mới" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg submit-btn" [disabled]="loading()">
            {{ loading() ? 'Đang xử lý...' : 'Đặt lại mật khẩu' }}
          </button>
          <div class="divider-text text-center text-muted my-3">Hoặc</div>
          <button type="button" class="btn btn-outline-primary w-100 btn-lg create-account-btn" (click)="step.set(1)">
            Quay lại nhập email
          </button>
        </form>
      }
    </div>
  </div>
</div>
