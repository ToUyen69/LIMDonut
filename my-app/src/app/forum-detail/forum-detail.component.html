<div class="forum-detail-page" *ngIf="post">
  <!-- Detail Banner -->
  <section class="page-banner">
    <div class="banner-content text-center">
      <h1 class="title">{{ post.title }}</h1>
    </div>
  </section>

  <section class="detail-content">
    <div class="container">
      <div class="card border-0 shadow-sm detail-card">
        <div class="card-body p-4 p-md-5">
          <div class="text-center mb-4">
            <span class="text-muted small border-bottom pb-2">{{ post.date }}</span>
          </div>

          <h2 class="post-title-main text-center text-uppercase mb-4">{{ post.title }}</h2>

          <div class="text-center mb-5">
            <div class="logo-circle mx-auto">
              <img src="logo.png" alt="LIMDonut">
            </div>
          </div>

          <!-- Main Image -->
          <div class="main-image-wrapper rounded-3 overflow-hidden mb-5">
            <img [src]="post.mainImage" [alt]="post.title" class="w-100 d-block">
          </div>

          <!-- Content Text -->
          <div class="post-text mb-5">
            <p>{{ post.content }}</p>
          </div>

          <!-- Detail Images -->
          <div class="row g-3 mb-5" *ngIf="post.detailImages && post.detailImages.length > 0">
            <div [ngClass]="{'col-md-6': post.detailImages.length === 2, 'col-md-4': post.detailImages.length >= 3}" *ngFor="let img of post.detailImages">
              <img [src]="img" alt="Detail image" class="img-fluid rounded-3 shadow-sm w-100">
            </div>
          </div>

          <!-- Footer Tags -->
          <div *ngIf="post.tags && post.tags.length > 0" class="border-top pt-4 mb-4">
            <div class="d-flex gap-3 justify-content-center flex-wrap">
              <span class="badge bg-light text-muted fw-normal" *ngFor="let tag of post.tags">{{ tag }}</span>
            </div>
          </div>

          <div class="text-center">
            <button class="btn btn-primary rounded-2 px-4 py-2" routerLink="/forum">Quay lại Diễn đàn</button>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
