<div class="login-page d-flex justify-content-center align-items-center min-vh-100">
  <div class="card login-card border-0">
    <div class="card-body p-0">
      <div class="form-header text-center mb-4">
        <div class="brand-mini-label">LỊM DONUT</div>
        <h1 class="welcome-text">Chào mừng bạn đã trở lại!</h1>
        <p class="welcome-subtext">Cùng Lịm thưởng thức những chiếc bánh ngọt ngào nhất.</p>
      </div>

      <div class="login-type-title text-center mb-4">
        <span>{{ isLoginMode() ? 'Đăng nhập Khách hàng' : 'Đăng ký thành viên' }}</span>
      </div>

      <form (ngSubmit)="onSubmit()" class="login-form mx-auto">
        <div class="mb-3">
          <label for="username" class="form-label fw-bold">Tên đăng nhập <span class="text-danger">*</span></label>
          <input type="text" id="username" class="form-control form-control-lg" [ngModel]="username()" (ngModelChange)="username.set($event)" name="username" placeholder="Nhập tên đăng nhập" required>
        </div>

        @if (!isLoginMode()) {
          <div class="mb-3">
            <label for="email" class="form-label fw-bold">Email <span class="text-danger">*</span></label>
            <input type="email" id="email" class="form-control form-control-lg" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" placeholder="Nhập địa chỉ email" required>
          </div>
          <div class="mb-3">
            <label for="referralCode" class="form-label fw-bold">Mã giới thiệu <span class="text-muted fw-normal">(không bắt buộc)</span></label>
            <input type="text" id="referralCode" class="form-control form-control-lg" [ngModel]="referralCode()" (ngModelChange)="referralCode.set($event)" name="referralCode" placeholder="Nhập mã giới thiệu nếu có">
          </div>
        }

        <div class="mb-3">
          <label for="password" class="form-label fw-bold">Mật khẩu <span class="text-danger">*</span></label>
          <div class="pwd-wrapper">
            <input type="password" id="password" class="form-control form-control-lg" [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" placeholder="Nhập mật khẩu" required>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="remember">
            <label class="form-check-label fw-bold" for="remember">Ghi nhớ?</label>
          </div>
          @if (isLoginMode()) {
            <a routerLink="/forgot-password" class="forgot-pwd text-decoration-none">Quên mật khẩu?</a>
          }
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-lg submit-btn">
          {{ isLoginMode() ? 'Đăng nhập' : 'Đăng ký' }}
        </button>

        <div class="divider-text text-center text-muted my-3">Hoặc</div>

        <button type="button" class="btn btn-outline-primary w-100 btn-lg create-account-btn" (click)="toggleMode()">
          {{ isLoginMode() ? 'Tạo tài khoản mới' : 'Đã có tài khoản? Đăng nhập' }}
        </button>
      </form>
    </div>
  </div>
</div>
